services:
  frontend:
    build:
      context: ./Frontend
    container_name: codephoenix-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: codephoenix-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+psycopg://codephoenix:codephoenix@db:5432/codephoenix
      SECRET_KEY: change-me-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: codephoenix-db
    environment:
      POSTGRES_DB: codephoenix
      POSTGRES_USER: codephoenix
      POSTGRES_PASSWORD: codephoenix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codephoenix -d codephoenix"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  frontend_node_modules:
